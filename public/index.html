<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shashank's Notes">
    <title>Shashank's Notes</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">
                    <i class="fa-solid fa-feather-pointed"></i>
                </div>
                <div>
                    <h1>Shashank's Notes</h1>
                    <span class="brand-kicker">Personal workspace</span>
                </div>
            </div>
            
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Search notes...">
            </div>

            <div class="stats-panel">
                <div class="stat-card">
                    <i class="fa-regular fa-note-sticky"></i>
                    <span class="stat-num" id="total-notes-count">0</span>
                    <span class="stat-label">Total Notes</span>
                </div>
            </div>

            <button type="button" id="sidebar-chat-btn" class="sidebar-nav-btn">
                <span class="nav-btn-icon"><i class="fa-solid fa-robot"></i></span>
                <span class="nav-btn-text">
                    <span class="nav-btn-title">AI Assistant</span>
                    <span class="nav-btn-sub">Ask about your notes</span>
                </span>
                <i class="fa-solid fa-chevron-right nav-btn-chevron"></i>
            </button>

            <footer class="sidebar-footer">
                <p>Synced with <span class="neon-badge"><i class="fa-solid fa-database"></i> Neon DB</span></p>
            </footer>
        </aside>

        <main class="workspace">
            <header class="workspace-header">
                <div>
                    <p class="eyebrow">Today</p>
                    <h2>Notes</h2>
                </div>
                <div class="sync-chip" id="last-sync">
                    <i class="fa-solid fa-rotate"></i>
                    <span>Syncing</span>
                </div>
            </header>

            <section class="creator-section">
                <form id="note-form" class="note-creator-card">
                    <input type="text" id="note-title" placeholder="Title" required autocomplete="off">
                    <textarea id="note-content" placeholder="Take a note..." rows="3"></textarea>
                    
                    <div class="creator-actions">
                        <div class="color-palette">
                            <label class="color-option" style="--color: #1e293b;" title="Slate">
                                <input type="radio" name="note-color" value="#1e293b" checked>
                                <span class="color-indicator"></span>
                            </label>
                            <label class="color-option" style="--color: #075e54;" title="Emerald">
                                <input type="radio" name="note-color" value="#075e54">
                                <span class="color-indicator"></span>
                            </label>
                            <label class="color-option" style="--color: #0284c7;" title="Ocean">
                                <input type="radio" name="note-color" value="#0284c7">
                                <span class="color-indicator"></span>
                            </label>
                            <label class="color-option" style="--color: #7c3aed;" title="Amethyst">
                                <input type="radio" name="note-color" value="#7c3aed">
                                <span class="color-indicator"></span>
                            </label>
                            <label class="color-option" style="--color: #b91c1c;" title="Ruby">
                                <input type="radio" name="note-color" value="#b91c1c">
                                <span class="color-indicator"></span>
                            </label>
                            <label class="color-option" style="--color: #b45309;" title="Amber">
                                <input type="radio" name="note-color" value="#b45309">
                                <span class="color-indicator"></span>
                            </label>
                        </div>

                        <button type="submit" class="btn-create" id="btn-save-note">
                            <span class="btn-text">Save Note</span>
                            <i class="fa-solid fa-plus btn-icon"></i>
                        </button>
                    </div>
                </form>
            </section>

            <section class="notes-section">
                <div class="section-bar">
                    <h2>All notes</h2>
                    <span id="visible-notes-count">0 shown</span>
                </div>
                <div class="notes-grid" id="notes-grid">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">
                            <i class="fa-regular fa-folder-open"></i>
                        </div>
                        <h3>No notes found</h3>
                        <p>Create a note to start your workspace</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Note Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Note</h2>
                <button type="button" class="btn-close-modal" id="btn-close-modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-note-id">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="edit-content">Content</label>
                    <textarea id="edit-content" rows="4" placeholder="Update note description..."></textarea>
                </div>
                
                <div class="form-group color-group">
                    <label>Card Color</label>
                    <div class="color-palette edit-palette">
                        <label class="color-option" style="--color: #1e293b;" title="Slate">
                            <input type="radio" name="edit-note-color" value="#1e293b">
                            <span class="color-indicator"></span>
                        </label>
                        <label class="color-option" style="--color: #075e54;" title="Emerald">
                            <input type="radio" name="edit-note-color" value="#075e54">
                            <span class="color-indicator"></span>
                        </label>
                        <label class="color-option" style="--color: #0284c7;" title="Ocean">
                            <input type="radio" name="edit-note-color" value="#0284c7">
                            <span class="color-indicator"></span>
                        </label>
                        <label class="color-option" style="--color: #7c3aed;" title="Amethyst">
                            <input type="radio" name="edit-note-color" value="#7c3aed">
                            <span class="color-indicator"></span>
                        </label>
                        <label class="color-option" style="--color: #b91c1c;" title="Ruby">
                            <input type="radio" name="edit-note-color" value="#b91c1c">
                            <span class="color-indicator"></span>
                        </label>
                        <label class="color-option" style="--color: #b45309;" title="Amber">
                            <input type="radio" name="edit-note-color" value="#b45309">
                            <span class="color-indicator"></span>
                        </label>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-cancel-edit">Cancel</button>
                    <button type="submit" class="btn-save-edit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Chatbot Panel -->
    <div id="chat-panel" class="chat-panel">
        <div class="chat-header">
            <div class="chat-brand">
                <i class="fa-solid fa-robot"></i>
                <span>AI Chat</span>
            </div>
            <div class="chat-actions">
                <button id="btn-save-chat" title="Save chat as note" class="chat-action-btn">
                    <i class="fa-regular fa-bookmark"></i>
                </button>
                <button id="btn-clear-chat" title="Clear chat" class="chat-action-btn">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
                <button id="btn-close-chat" title="Close chat" class="chat-action-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-welcome">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <p>Ask me anything. I will help you and you can save our conversation as a note.</p>
            </div>
        </div>

        <!-- Config form (appears when API key is missing) -->
        <form id="chat-config-form" class="chat-config-row" style="display:none;">
            <div class="chat-config-inner">
                <label>DeepSeek API Key</label>
                <input type="password" id="chat-api-key" placeholder="sk-..." autocomplete="off">
                <button type="submit" class="chat-send-btn" title="Save API Key">
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </form>
        <form id="chat-form" class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
            <button type="submit" class="chat-send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <!-- Floating Chat Toggle -->
    <button id="chat-toggle" class="chat-toggle" title="Open AI Chat">
        <i class="fa-solid fa-robot"></i>
    </button>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Confirm Dialog Modal -->
    <div id="confirm-modal" class="modal-overlay confirm-overlay" style="display: none;">
        <div class="modal-content confirm-modal-content">
            <p id="confirm-message"></p>
            <div class="modal-actions">
                <button id="confirm-cancel" class="btn-cancel">Cancel</button>
                <button id="confirm-ok" class="btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Prompt Dialog Modal -->
    <div id="prompt-modal" class="modal-overlay prompt-overlay" style="display: none;">
        <div class="modal-content prompt-modal-content">
            <p id="prompt-message"></p>
            <input type="text" id="prompt-input" placeholder="Enter value..." autocomplete="off">
            <div class="modal-actions">
                <button id="prompt-cancel" class="btn-cancel">Cancel</button>
                <button id="prompt-ok" class="btn-save-edit">OK</button>
            </div>
        </div>
    </div>

    <!-- Script file -->
    <script src="app.js"></script>
</body>
</html>
